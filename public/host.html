<!DOCTYPE html>
<html>
<head>
  <title>Generation Gala - Host Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <img src="images/im2.png" class="logo">
  <h1>Generation Gala</h1>
  <img src="images/im1.png" class="logo">
</header>

<main>

<!-- ROUND CONTROL -->
<div class="card">
  <h2>Round Control</h2>
  <button onclick="setRound('faceoff')">Face-Off Round</button>
  <button onclick="setRound('fastmoney')">Fast Money Round</button>
</div>

<!-- FACE-OFF TEAM SETUP -->
<div class="card">
  <h2>Face-Off Teams</h2>

  <input type="text" id="faceA" placeholder="Face-Off Team A Name">
  <input type="text" id="faceB" placeholder="Face-Off Team B Name">

  <br><br>

  <button onclick="updateFaceTeams()">Update Face-Off Teams</button>
  <button onclick="resetFaceTeams()">Reset Face-Off Teams</button>
</div>

<!-- FAST MONEY TEAM SETUP -->
<div class="card">
  <h2>Fast Money Teams</h2>

  <input type="text" id="fastA" placeholder="Fast Money Team A Name">
  <input type="text" id="fastB" placeholder="Fast Money Team B Name">

  <br><br>

  <button onclick="updateFastTeams()">Update Fast Money Teams</button>
  <button onclick="resetFastTeams()">Reset Fast Money Teams</button>
</div>

<!-- QUESTION DISPLAY -->
<div class="card">
  <h2 id="question">Loading...</h2>
  <div id="answers"></div>
</div>

<!-- SCOREBOARD -->
<div class="card">
  <h3 id="scores">Scores will appear here</h3>
</div>

<!-- FACE-OFF CONTROLS -->
<div class="card">
  <h2>Face-Off Controls</h2>

  <button onclick="giveControl('A')">Give Control → Team A</button>
  <button onclick="giveControl('B')">Give Control → Team B</button>

  <br><br>

  <button onclick="addStrike('A')">Strike Team A</button>
  <button onclick="addStrike('B')">Strike Team B</button>
  <button onclick="resetStrikes()">Reset Strikes</button>

  <br><br>

  <button onclick="nextFaceoffQuestion()">Next Face-Off Question</button>
</div>

<!-- FAST MONEY CONTROLS -->
<div class="card">
  <h2>Fast Money Controls</h2>

  <button onclick="startTimer()">Start 20s Timer</button>
  <button onclick="resetTimer()">Reset Timer</button>

  <br><br>

  <button onclick="nextFastQuestion()">Next Fast Money Question</button>
</div>

<!-- MANUAL POINTS -->
<div class="card">
  <h2>Manual Points Control</h2>

  <input type="number" id="manualPoints" placeholder="Enter Points">

  <br><br>

  <button onclick="awardPoints('A')">Award Points to Team A</button>
  <button onclick="awardPoints('B')">Award Points to Team B</button>

  <br><br>

  <button onclick="deductPoints('A')">Deduct Points from Team A</button>
  <button onclick="deductPoints('B')">Deduct Points from Team B</button>
</div>

</main>

<footer>
  <p>Made by VSM with ❤️</p>
  <p>© 2026 Generation Gala. All rights reserved.</p>
</footer>

<!-- IMPORTANT: DO NOT REMOVE -->
<script src="/socket.io/socket.io.js"></script>
<script src="js/host.js"></script>

</body>
</html>
