<!DOCTYPE html>
<html>
<head>
  <title>Round 1 Host</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <img src="../images/logo-left.png" class="logo">
  <h1>Generation Gala - Round 1</h1>
  <img src="../images/logo-right.png" class="logo">
</header>

<main>

<div class="card">
  <h2>Team Setup</h2>
  <input id="teamAName" placeholder="Team A Name">
  <input id="teamBName" placeholder="Team B Name">
  <button onclick="updateTeams()">Update Teams</button>
  <button onclick="resetGame()">Reset Game</button>
</div>

<div class="card">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <button onclick="prevQuestion()">Previous</button>
  <button onclick="nextQuestion()">Next</button>
</div>

<div class="card">
  <h3 id="scoreboard"></h3>
  <h3 id="controlDisplay"></h3>
</div>

<div class="card">
  <button onclick="giveControl('A')">Give Control → Team A</button>
  <button onclick="giveControl('B')">Give Control → Team B</button>
  <button onclick="addStrike('A')">Strike Team A</button>
  <button onclick="addStrike('B')">Strike Team B</button>
  <button onclick="resetStrikes()">Reset Strikes</button>
</div>

<div class="card">
  <h2>Manual Points</h2>
  <input type="number" id="manualPoints">
  <button onclick="awardPoints('A')">Award A</button>
  <button onclick="awardPoints('B')">Award B</button>
  <button onclick="deductPoints('A')">Deduct A</button>
  <button onclick="deductPoints('B')">Deduct B</button>
</div>

</main>

<footer>Round 1 Host</footer>

<script src="/socket.io/socket.io.js"></script>
<script src="../js/round1-host.js"></script>

</body>
</html>
